      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10" />
      <stop offset="50%" stop-color="#5DA9FF" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.12" />
    </linearGradient>

    <linearGradient id="countryStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5DA9FF" />
      <stop offset="50%" stop-color="#8B5CF6" />
